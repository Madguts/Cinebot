<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisburn Cinema Picker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; }
        h2 { color: #e50914; margin-top: 0; text-align: center; }
        label { display: block; margin: 10px 0 5px; font-size: 0.8rem; color: #aaa; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #e50914; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        .movie-card { background: #252525; padding: 15px; border-radius: 10px; border-left: 4px solid #e50914; }
        .time-tag { display: inline-block; background: #444; padding: 5px 10px; margin: 4px; border-radius: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lisburn Picker</h2>
    
    <label>Date:</label>
    <input type="date" id="datePicker">
    
    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>From:</label>
            <input type="time" id="t1" value="17:00">
        </div>
        <div style="flex:1">
            <label>Until:</label>
            <input type="time" id="t2" value="22:00">
        </div>
    </div>
    
    <button onclick="fetchMovies()">Roll the Dice</button>

    <div id="result"></div>
</div>

<script>
    document.getElementById('datePicker').valueAsDate = new Date();

    async function fetchMovies() {
        const res = document.getElementById('result');
        const dateVal = document.getElementById('datePicker').value;
        const startTime = document.getElementById('t1').value;
        const endTime = document.getElementById('t2').value;

        res.innerHTML = "Rolling the dice...";

        try {
            // We use entertainment.ie as a source because their HTML is much cleaner for scraping
            const targetUrl = 'https://entertainment.ie/cinema/cinema-listings/antrim/omniplex-lisburn/';
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // 1. Format our target date to match their format (e.g., "Tue 14 Apr")
            const dateObj = new Date(dateVal);
            const targetDayLabel = dateObj.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
            // Remove the period from the month if it exists (e.g. "Apr." -> "Apr")
            const cleanTarget = targetDayLabel.replace('.', '');

            let pool = [];

            // 2. Find all film containers
            const films = doc.querySelectorAll('.cinema-listings__item');

            films.forEach(film => {
                const title = film.querySelector('.cinema-listings__film-title')?.innerText.trim();
                
                // 3. Find the specific "Day" block inside this film's listing
                const dayBlocks = film.querySelectorAll('.cinema-listings__day');
                
                dayBlocks.forEach(block => {
                    const blockDate = block.querySelector('.cinema-listings__day-name')?.innerText.trim();
                    
                    // If this block matches our selected date (e.g. "Tue 14 Apr")
                    if (blockDate && blockDate.includes(cleanTarget)) {
                        let times = [];
                        const timeLinks = block.querySelectorAll('.cinema-listings__showtime');
                        
                        timeLinks.forEach(t => {
                            const timeText = t.innerText.trim(); // e.g. "19:30"
                            if (timeText >= startTime && timeText <= endTime) {
                                times.push(timeText);
                            }
                        });

                        if (times.length > 0) {
                            pool.push({ title, times });
                        }
                    }
                });
            });

            // 4. Display Results
            if (pool.length === 0) {
                res.innerHTML = `No movies found for ${cleanTarget} between ${startTime} and ${endTime}.`;
            } else {
                const choice = pool[Math.floor(Math.random() * pool.length)];
                res.innerHTML = `
                    <div class="movie-card">
                        <small style="color:#aaa">RANDOM SELECTION FOR ${cleanTarget}:</small>
                        <div style="font-size:1.2rem; font-weight:bold; margin: 5px 0;">${choice.title}</div>
                        <div>${choice.times.map(t => `<span class="time-tag">${t}</span>`).join('')}</div>
                    </div>
                `;
            }

        } catch (err) {
            res.innerHTML = "Connection error. Please try again in a moment.";
            console.error(err);
        }
    }
</script>

</body>
</html>

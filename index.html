<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisburn Cinema Picker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #333; }
        h2 { color: #e50914; margin-top: 0; text-align: center; }
        label { display: block; margin: 10px 0 5px; font-size: 0.8rem; color: #aaa; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #e50914; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        .movie-card { background: #252525; padding: 15px; border-radius: 10px; border-left: 4px solid #e50914; }
        .time-tag { display: inline-block; background: #444; padding: 5px 10px; margin: 4px; border-radius: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lisburn Picker</h2>
    
    <label>Date:</label>
    <input type="date" id="datePicker">
    
    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>From:</label>
            <input type="time" id="t1" value="17:00">
        </div>
        <div style="flex:1">
            <label>Until:</label>
            <input type="time" id="t2" value="22:00">
        </div>
    </div>
    
    <button onclick="fetchMovies()">Roll the Dice</button>

    <div id="result"></div>
</div>

<script>
    document.getElementById('datePicker').valueAsDate = new Date();

    async function fetchMovies() {
        const res = document.getElementById('result');
        const dateVal = document.getElementById('datePicker').value;
        const startTime = document.getElementById('t1').value;
        const endTime = document.getElementById('t2').value;

        res.innerHTML = "Checking listings...";

        try {
            // Using a more reliable target URL for the Lisburn cinema
            const targetUrl = 'https://www.omniplexcinemas.co.uk/cinema/lisburn';
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Network error');
            const html = await response.text();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Omniplex often uses "Friday 14th April" style or just "Friday"
            const dateObj = new Date(dateVal);
            const selectedDayName = dateObj.toLocaleDateString('en-GB', { weekday: 'long' });
            
            // Log for debugging
            console.log("Searching for day:", selectedDayName);

            // Updated selector to find the movie containers
            const movieItems = doc.querySelectorAll('.movie-list__item, .film-list__item');
            let pool = [];

            movieItems.forEach(movie => {
                const title = movie.querySelector('h3, .film-list__title, .movie-list__title')?.innerText.trim();
                
                // Find all showtime sections within this movie
                const sections = movie.querySelectorAll('.showtimes__day, .film-list__showtimes-day');
                
                sections.forEach(section => {
                    const dayLabel = section.innerText.trim();
                    
                    // Check if this section belongs to the day the user picked
                    if (dayLabel.toLowerCase().includes(selectedDayName.toLowerCase())) {
                        let times = [];
                        // Find the individual time buttons/links
                        const timeElements = section.querySelectorAll('.showtimes__time, .film-list__session-time, a[data-time]');
                        
                        timeElements.forEach(t => {
                            const val = t.innerText.trim().match(/\d{2}:\d{2}/)?.[0]; // Extract HH:mm
                            if (val && val >= startTime && val <= endTime) {
                                times.push(val);
                            }
                        });

                        if (times.length > 0) {
                            pool.push({ title, times });
                        }
                    }
                });
            });

            if (pool.length === 0) {
                res.innerHTML = "No movies found. Try a wider time range or check if the date is correct.";
            } else {
                const choice = pool[Math.floor(Math.random() * pool.length)];
                res.innerHTML = `
                    <div class="movie-card">
                        <small style="color:#aaa">RANDOM SELECTION:</small>
                        <div style="font-size:1.2rem; font-weight:bold; margin: 5px 0;">${choice.title}</div>
                        <div>${choice.times.map(t => `<span class="time-tag">${t}</span>`).join('')}</div>
                    </div>
                `;
            }

        } catch (err) {
            res.innerHTML = "Error fetching data. The proxy might be down or the site layout changed.";
            console.error(err);
        }
    }
</script>

</body>
</html>
